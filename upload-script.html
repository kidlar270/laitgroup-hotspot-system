<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hotspot Pro | Upload Script</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .sidebar-item.active {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="text-slate-900">

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar -->
        <aside class="w-full md:w-72 bg-slate-900 text-white p-6 flex flex-col shrink-0">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-wifi text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">HOTSPOT<span class="text-blue-500">PRO</span></h1>
            </div>
            
            <nav class="space-y-1 flex-1">
                <a href="index.html" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:text-white hover:bg-slate-800 text-sm font-bold">
                    <i class="fas fa-th-large w-5"></i>
                    <span>Overview</span>
                </a>
                <a href="api-user.html" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:text-white hover:bg-slate-800 text-sm font-bold">
                    <i class="fas fa-user-secret w-5"></i>
                    <span>API User</span>
                </a>
                <a href="upload-script.html" class="sidebar-item active w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-200 group text-sm font-bold">
                    <i class="fas fa-upload w-5"></i>
                    <span>Upload Script</span>
                </a>
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-800">
                <div class="flex items-center gap-3 px-3 py-2 bg-slate-800/50 rounded-xl">
                    <div id="user-initials" class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-xs">--</div>
                    <div class="overflow-hidden">
                        <p id="user-display-name" class="text-sm font-medium truncate italic text-slate-400">Loading auth...</p>
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Network Owner</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-10 lg:p-12 overflow-y-auto">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-extrabold text-slate-900 tracking-tight">Upload MikroTik Script</h2>
                    <p class="text-slate-500 mt-1">Upload a custom .rsc script to your MikroTik router.</p>
                </div>
            </header>

            <div class="space-y-8">
                <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="p-3 rounded-2xl bg-blue-50 text-blue-600">
                            <i class="fas fa-file-code text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">Custom Script</h3>
                            <p class="text-xs text-slate-500">Paste your script content below.</p>
                        </div>
                    </div>

                    <form id="upload-form" class="space-y-4">
                        <div>
                            <label for="api-token" class="block text-sm font-medium text-slate-700">API Token</label>
                            <input type="text" id="api-token" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="Paste your API token here">
                        </div>
                        <div>
                            <label for="script-content" class="block text-sm font-medium text-slate-700">Script Content</label>
                            <textarea id="script-content" rows="10" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="Paste your .rsc script content here"></textarea>
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md font-bold hover:bg-blue-700 transition">Upload Script</button>
                    </form>
                    <div id="upload-status" class="mt-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADfXnmdXjeRbEewPCSrsKMDFXvIjTRsuA",
            authDomain: "protech-d6a95.firebaseapp.com",
            projectId: "protech-d6a95",
            storageBucket: "protech-d6a95.firebasestorage.app",
            messagingSenderId: "869476702981",
            appId: "1:869476702981:web:365d6103fbb1c87602f56c",
            measurementId: "G-VGEF25Q2YT"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'us-central1');

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-display-name').innerText = user.uid.substring(0, 10) + "...";
                document.getElementById('user-initials').innerText = "AD";
            }
        });

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const apiToken = document.getElementById('api-token').value;
            const scriptContent = document.getElementById('script-content').value;
            const uploadStatus = document.getElementById('upload-status');

            if (!apiToken || !scriptContent) {
                uploadStatus.innerHTML = '<p class="text-red-500">API token and script content are required.</p>';
                return;
            }

            try {
                uploadStatus.innerHTML = '<p class="text-blue-500">Authenticating...</p>';
                const userCredential = await signInWithCustomToken(auth, apiToken);
                currentUser = userCredential.user;
                const userId = currentUser.uid;
                const appId = firebaseConfig.projectId;

                uploadStatus.innerHTML = '<p class="text-blue-500">Uploading script...</p>';
                
                await setDoc(doc(db, 'artifacts', appId, 'users', userId, 'sync', 'mikrotik'), {
                    script: scriptContent,
                    timestamp: Date.now(),
                    updatedAt: Date.now(),
                    trigger: 'manual-upload'
                });

                uploadStatus.innerHTML = '<p class="text-green-500">Script uploaded successfully! It will be synced to your router shortly.</p>';
            } catch (error) {
                console.error('Error uploading script:', error);
                uploadStatus.innerHTML = '<p class="text-red-500">Error uploading script: ' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
