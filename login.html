<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>LAROI HOTSPOT HUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Space+Grotesk:wght@600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
            --bg-top: #06211b;
            --bg-bottom: #0a5f4a;
            --card: rgba(248, 250, 252, 0.92);
            --text: #0f172a;
            --muted: #5b6b80;
            --border: rgba(148, 163, 184, 0.24);
            --accent: #16a34a;
            --accent-2: #0ea5a4;
            --accent-3: #0284c7;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 14% 14%, rgba(45, 212, 191, 0.24), transparent 32%),
                radial-gradient(circle at 86% 6%, rgba(14, 165, 233, 0.2), transparent 28%),
                radial-gradient(circle at 50% 100%, rgba(132, 204, 22, 0.16), transparent 42%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        .page {
            width: min(100%, 420px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 18px 14px 28px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
            padding: 24px 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 28px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.86), rgba(8, 47, 73, 0.8));
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
            color: #fff;
            animation: floatIn .55s ease-out both;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -30px -60px auto;
            width: 180px;
            height: 180px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.35), transparent 64%);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero-title {
            margin: 16px 0 8px;
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-size: 27px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .hero-sub {
            margin: 0;
            max-width: 280px;
            color: rgba(255, 255, 255, 0.82);
            font-size: 13px;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            gap: 14px;
        }

        .glass-card {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--card);
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.12);
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .glass-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 46px rgba(15, 23, 42, 0.16);
        }

        .card-body {
            padding: 18px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-title {
            margin: 0;
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
        }

        .section-tag {
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--accent-2);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .plan-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .plan-card {
            position: relative;
            overflow: hidden;
            min-height: 106px;
            padding: 14px 12px;
            border: 1px solid rgba(37, 99, 235, 0.16);
            border-radius: 20px;
            background: linear-gradient(180deg, #ffffff, #eef6ff);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .plan-card::before {
            content: "";
            position: absolute;
            inset: auto -12px -30px auto;
            width: 72px;
            height: 72px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.16), transparent 64%);
        }

        .plan-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 28px rgba(37, 99, 235, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }

        .plan-title {
            color: #0f172a;
            font-size: 12px;
            font-weight: 800;
        }

        .plan-price {
            margin-top: 10px;
            color: var(--accent);
            font-size: 28px;
            line-height: 1;
            font-weight: 800;
        }

        .plan-price span {
            margin-left: 2px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 700;
        }

        .plan-name {
            margin-top: 10px;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.35;
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 18px 14px;
            border: 1px dashed #cbd5e1;
            border-radius: 18px;
            background: #fff;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        .packages-note {
            margin-top: 10px;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.5;
        }

        .label {
            display: block;
            margin-bottom: 7px;
            color: #334155;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        .input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            background: #fff;
            color: #0f172a;
            font-size: 14px;
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease;
        }

        .input:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 14px;
            font-weight: 800;
        }

        .hint {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
        }

        .status {
            display: none;
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 12px;
            line-height: 1.5;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .status.error {
            background: #fff1f2;
            color: #be123c;
        }

        .status.success {
            background: #ecfdf5;
            color: #15803d;
        }

        .action-btn {
            width: 100%;
            margin-top: 14px;
            padding: 15px 16px;
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .2s ease, filter .2s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            filter: saturate(1.08);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .pay-btn {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            box-shadow: 0 18px 34px rgba(34, 197, 94, 0.24);
        }

        .voucher-btn {
            background: linear-gradient(135deg, #2563eb, #9333ea);
            box-shadow: 0 18px 34px rgba(99, 102, 241, 0.24);
        }

        .access-bar {
            display: block;
            margin: 16px 0 12px;
            padding: 13px 16px;
            border-radius: 16px;
            background: linear-gradient(90deg, #0284c7, #14b8a6);
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 14px 30px rgba(2, 132, 199, 0.26);
            transition: transform .18s ease, box-shadow .2s ease;
        }

        .access-bar:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 32px rgba(13, 148, 136, 0.28);
        }

        .footer-note {
            margin-top: 14px;
            color: rgba(255, 255, 255, 0.86);
            font-size: 11px;
            text-align: center;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @media (max-width: 360px) {
            .page {
                padding-left: 10px;
                padding-right: 10px;
            }

            .plan-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Reference-inspired layout */
        body {
            background: #eef0f3;
            color: #374151;
        }
        .page {
            width: min(100%, 460px);
            padding: 8px 6px 20px;
        }
        .hero {
            border: 0;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
            color: #334155;
            padding: 6px 0 2px;
            margin-bottom: 8px;
            animation: none;
            text-align: center;
        }
        .hero::after {
            display: none;
        }
        .hero-title {
            margin: 0;
            padding: 8px 10px;
            font-family: "Manrope", "Segoe UI", sans-serif;
            font-size: 31px;
            line-height: 1.1;
            background: linear-gradient(90deg, #17b36d, #9de132);
            color: #3f4854;
            letter-spacing: 0;
        }
        .pill {
            margin-top: 12px;
            border: none;
            border-radius: 4px;
            background: #29b968;
            color: #ffffff;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: none;
        }
        .hero-sub {
            margin: 12px auto 4px;
            max-width: 320px;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.45;
        }
        .glass-card {
            margin-top: 12px;
            border-radius: 9px;
            border: 1px solid #d4d8de;
            background: #eceef2;
            box-shadow: none;
        }
        .glass-card:hover {
            transform: none;
            box-shadow: none;
        }
        .card-body {
            padding: 14px;
        }
        .section-title {
            color: #5865f2;
            font-size: 30px;
            font-weight: 800;
            margin: 2px 0 12px;
            text-align: left;
        }
        .section-title-center {
            text-align: center;
            font-size: 29px;
        }
        .plan-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .long-term-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .plan-card {
            min-height: 96px;
            border-radius: 8px;
            border: 2px solid #d6dbe2;
            background: #f7f8fa;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
            padding: 12px 8px;
            text-align: center;
        }
        .plan-card::before {
            display: none;
        }
        .plan-title {
            color: #444f5f;
            font-size: 17px;
            font-weight: 800;
        }
        .plan-price {
            margin-top: 8px;
            color: #16a34a;
            font-size: 39px;
            font-weight: 800;
        }
        .plan-price span {
            font-size: 14px;
            color: #a2aab7;
            margin-left: 0;
        }
        .plan-name {
            margin-top: 0;
            font-size: 0;
            height: 0;
            overflow: hidden;
        }
        .packages-note {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
        }
        .label.normal-label {
            color: #4b5563;
            font-size: 12px;
            letter-spacing: 0;
            text-transform: none;
            margin-bottom: 6px;
        }
        .no-icon-input {
            padding: 12px 10px;
        }
        .input {
            border-radius: 6px;
            border: 1px solid #c8ced8;
            background: #ebeff7;
            box-shadow: inset 0 1px 1px rgba(15, 23, 42, 0.04);
        }
        .action-btn {
            border-radius: 7px;
            padding: 12px;
            margin-top: 12px;
            font-size: 15px;
            box-shadow: none;
        }
        .pay-btn {
            background: linear-gradient(90deg, #10b981, #16a34a);
        }
        .or-row {
            margin: 14px 0 8px;
            text-align: center;
            color: #a2aab7;
            font-weight: 700;
            position: relative;
        }
        .or-row::before,
        .or-row::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #d2d7df;
        }
        .or-row::before { left: 0; }
        .or-row::after { right: 0; }
        .or-row span {
            background: #eef0f3;
            padding: 0 10px;
            position: relative;
        }
        .access-bar {
            border-radius: 0;
            margin: 0 0 10px;
            padding: 12px 10px;
            background: linear-gradient(90deg, #3972f6, #8b2ce0);
            font-size: 36px;
            text-transform: none;
            letter-spacing: 0;
            box-shadow: none;
        }
        .auth-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .auth-box {
            border: 1px solid #d3d8df;
            border-radius: 9px;
            padding: 12px;
            background: #e6e8ec;
        }
        .auth-title {
            margin: 0 0 10px;
            text-align: center;
            color: #4b5563;
            font-size: 28px;
            font-weight: 800;
        }
        .input-small {
            margin-bottom: 8px;
            padding: 11px 10px;
            font-size: 13px;
        }
        .login-btn {
            background: linear-gradient(180deg, #4f46e5, #4338ca);
            margin-top: 8px;
        }
        .voucher-btn {
            background: linear-gradient(180deg, #8b5cf6, #7c3aed);
            margin-top: 8px;
        }
        .footer-note {
            display: none;
        }
        @media (max-width: 420px) {
            .section-title { font-size: 24px; }
            .section-title-center { font-size: 22px; }
            .access-bar { font-size: 28px; }
            .auth-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1 class="hero-title">Pay with M-Pesa</h1>
            <div class="pill">LAROI TECH</div>
            <p class="hero-sub">Select your desired plan and enter your M-Pesa phone number to connect.</p>
        </div>

        <div class="glass-card">
            <div class="card-body">
                <h2 class="section-title section-title-center">Short-Term Plans</h2>
                <div class="plan-grid" id="short-term-packages">
                    <div class="empty-state">Loading packages...</div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="card-body">
                <h2 class="section-title section-title-center">Long-Term Plans</h2>
                <div class="plan-grid long-term-grid" id="long-term-packages">
                    <div class="empty-state">Loading packages...</div>
                </div>
                <div class="packages-note" id="packages-note">Looking for your saved dashboard packages...</div>
            </div>
        </div>

        <div class="glass-card">
            <div class="card-body">
                <label class="label normal-label" for="mpesa-number">Phone Number</label>
                <div class="input-wrap">
                    <input class="input no-icon-input" id="mpesa-number" type="tel" placeholder="e.g. 254712345678">
                </div>
                <button class="action-btn pay-btn" id="stk-push-btn" type="button">Pay Now</button>
                <div class="status info" id="payment-status"></div>
            </div>
        </div>

        <div class="or-row"><span>OR</span></div>
        <a class="access-bar" href="#access">Access Your Account</a>

        <div class="glass-card" id="access">
            <div class="card-body">
                <form id="voucher-form" action="$(link-login-only)" method="post">
                    <input type="hidden" name="dst" value="$(link-orig)">
                    <input type="hidden" name="popup" value="true">
                    <input id="auth-username" type="hidden" name="username" value="">
                    <input id="auth-password" type="hidden" name="password" value="">

                    <div class="auth-panels">
                        <div class="auth-box">
                            <h3 class="auth-title">User Login</h3>
                            <label class="label normal-label" for="hotspot-username">Username</label>
                            <input class="input input-small" id="hotspot-username" type="text" name="hotspotUsername" placeholder="Protech">
                            <label class="label normal-label" for="hotspot-password">Password</label>
                            <input class="input input-small" id="hotspot-password" type="password" name="hotspotPassword" placeholder="...">
                            <button class="action-btn login-btn" id="login-submit-btn" type="submit">Log In</button>
                        </div>

                        <div class="auth-box">
                            <h3 class="auth-title">Redeem Voucher</h3>
                            <label class="label normal-label" for="voucher-code">Voucher Code</label>
                            <input class="input input-small" id="voucher-code" type="text" name="voucherCode" placeholder="Enter your voucher">
                            <button class="action-btn voucher-btn" id="voucher-submit-btn" type="submit">Activate Voucher</button>
                        </div>
                    </div>

                    <div class="status info" id="voucher-status"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- M-Pesa Phone Input Modal -->
    <div id="mpesa-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 simple-modal-body">
                <input type="tel" id="modal-phone-input" placeholder="Phone number e.g. 0712345678" class="simple-phone-input" inputmode="numeric" maxlength="12">
                <button onclick="submitMpesaModal()" class="simple-send-btn">Send</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { 
                opacity: 0; 
                transform: scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: scale(1);
            }
        }
        @keyframes modalPop {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.92);
            }
            65% {
                opacity: 1;
                transform: translateY(-4px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes sheenMove {
            from { transform: translateX(-130%) skewX(-18deg); }
            to { transform: translateX(240%) skewX(-18deg); }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }
        .zoom-in {
            animation: zoomIn 0.3s ease-out;
        }
        .hidden {
            display: none;
        }
        #mpesa-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(55, 65, 81, 0.35);
            backdrop-filter: blur(6px);
        }
        #mpesa-modal:not(.hidden) {
            display: flex;
        }
        #mpesa-modal > div {
            width: min(100%, 390px);
            border-radius: 10px;
            overflow: hidden;
            background: #eceef2;
            border: 1px solid #d4d8de;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.22);
            animation: modalPop 0.45s cubic-bezier(.2,.8,.2,1);
            position: relative;
        }
        #mpesa-modal > div::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 35%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0));
            pointer-events: none;
            animation: sheenMove 1.2s ease-out 0.1s 1;
        }
        #mpesa-modal .bg-gradient-to-r {
            background: linear-gradient(90deg, #17b36d, #9de132);
            color: #3f4854;
        }
        #mpesa-modal .text-white {
            color: #3f4854 !important;
        }
        #mpesa-modal .text-emerald-100 {
            color: #5f6773 !important;
        }
        #mpesa-modal .p-8 {
            padding: 20px;
        }
        #mpesa-modal .rounded-2xl {
            border-radius: 12px;
        }
        #mpesa-modal input[type="tel"] {
            width: 100%;
            border-radius: 6px;
            border: 1px solid #c8ced8;
            background: #ebeff7;
            color: #374151;
            font-weight: 700;
            transition: border-color .2s ease, box-shadow .2s ease;
        }
        #mpesa-modal input[type="tel"]:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.16);
            outline: none;
        }
        #mpesa-modal .bg-slate-50 {
            background: #e6e8ec;
        }
        #mpesa-modal button {
            font-weight: 800;
            border-radius: 7px;
            transition: transform .15s ease, box-shadow .2s ease, filter .2s ease, background-color .2s ease, border-color .2s ease;
            cursor: pointer;
            letter-spacing: 0.01em;
        }
        #mpesa-modal button:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }
        .simple-modal-body {
            display: grid;
            gap: 12px;
        }
        .simple-phone-input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #c8ced8;
            background: #ebeff7;
            color: #374151;
            font-size: 14px;
            font-weight: 700;
        }
        .simple-send-btn {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(90deg, #10b981, #16a34a);
            box-shadow: 0 8px 16px rgba(22, 163, 74, 0.28);
        }
        #mpesa-modal button:active {
            transform: translateY(0);
        }
        #mpesa-modal .px-8.py-6.bg-slate-50.border-t.border-slate-200.flex.gap-3 > button:first-child {
            background: #f7f8fa;
            border: 1px solid #cbd5e1;
            color: #4b5563;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        }
        #mpesa-modal .px-8.py-6.bg-slate-50.border-t.border-slate-200.flex.gap-3 > button:first-child:hover {
            border-color: #94a3b8;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.12);
        }
        #mpesa-modal .px-8.py-6.bg-slate-50.border-t.border-slate-200.flex.gap-3 > button:last-child {
            border: none;
            background: linear-gradient(90deg, #10b981, #16a34a);
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(22, 163, 74, 0.28);
            position: relative;
            overflow: hidden;
        }
        #mpesa-modal .px-8.py-6.bg-slate-50.border-t.border-slate-200.flex.gap-3 > button:last-child::after {
            content: "";
            position: absolute;
            top: 0;
            left: -40%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0));
            transform: skewX(-20deg);
            transition: left .35s ease;
        }
        #mpesa-modal .px-8.py-6.bg-slate-50.border-t.border-slate-200.flex.gap-3 > button:last-child:hover {
            box-shadow: 0 14px 28px rgba(21, 128, 61, 0.4);
        }
        #mpesa-modal .px-8.py-6.bg-slate-50.border-t.border-slate-200.flex.gap-3 > button:last-child:hover::after {
            left: 140%;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADfXnmdXjeRbEewPCSrsKMDFXvIjTRsuA",
            authDomain: "protech-d6a95.firebaseapp.com",
            projectId: "protech-d6a95",
            storageBucket: "protech-d6a95.firebasestorage.app",
            messagingSenderId: "869476702981",
            appId: "1:869476702981:web:365d6103fbb1c87602f56c",
            measurementId: "G-VGEF25Q2YT"
        };

        const appId = firebaseConfig.projectId;
        const queryOwnerId = new URLSearchParams(window.location.search).get("owner") || "";
        const ownerId =
            window.HOTSPOTPRO_OWNER_UID ||
            window.LAROI_OWNER_UID ||
            queryOwnerId ||
            localStorage.getItem("hotspotpro_owner_uid") ||
            localStorage.getItem("laroi_owner_uid") ||
            "";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Helper functions at module level
        window.openMpesaModal = (cardEl, pkgId, name, price, hours) => {
            selectedPackage = {
                id: pkgId,
                name: name,
                price: price,
                durationHours: hours
            };
            // Clear previous input
            document.getElementById('modal-phone-input').value = '';
            document.getElementById('modal-phone-input').focus();
            
            // Show modal
            document.getElementById('mpesa-modal').classList.remove('hidden');
            
            // Highlight package in background
            document.querySelectorAll('.plan-card').forEach(card => {
                card.style.borderColor = 'rgba(37, 99, 235, 0.2)';
                card.style.backgroundColor = '';
                card.style.boxShadow = 'inset 0 1px 0 rgba(255, 255, 255, 0.9)';
            });
            
            if (cardEl) {
                cardEl.style.borderColor = '#2563eb';
                cardEl.style.backgroundColor = '#dbeafe';
                cardEl.style.boxShadow = '0 18px 28px rgba(37, 99, 235, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.95)';
            }
        };

        window.closeMpesaModal = () => {
            document.getElementById('mpesa-modal').classList.add('hidden');
            selectedPackage = null;
        };

        window.submitMpesaModal = async () => {
            const phoneInput = document.getElementById('modal-phone-input').value.trim();
            
            
            if (!phoneInput) {
                setStatus(paymentStatus, "error", "Enter your phone number.");
                return;
            }


            
            // Format phone number
            let phoneNumber = phoneInput.replace(/^0/, '').replace(/[^0-9]/g, '');
            if (phoneNumber.length === 9) {
                phoneNumber = '0' + phoneNumber;
            }
            
            if (phoneNumber.length !== 10 || !phoneNumber.startsWith('0')) {
                setStatus(paymentStatus, "error", "Invalid format. Use 0712345678 or 712345678.");
                return;
            }


            
            if (!selectedPackage) {
                setStatus(paymentStatus, "error", "No package selected.");
                return;
            }


            
            // Close modal and initiate payment
            setTimeout(async () => {
                document.getElementById('mpesa-modal').classList.add('hidden');
                mpesaNumberInput.value = phoneNumber;
                await initiateMpesaPayment(phoneNumber);
            }, 300);
        };

        window.selectPackage = (cardEl, pkgId, name, price, hours) => {
            openMpesaModal(cardEl, pkgId, name, price, hours);
        };

        window.initiateMpesaPayment = async (phoneNumber) => {
            if (!ownerId) {
                setStatus(paymentStatus, "error", "Portal not linked to owner. Set owner ID first.");
                return;
            }

            if (!selectedPackage) {
                setStatus(paymentStatus, "error", "No package selected.");
                return;
            }

            try {
                setStatus(paymentStatus, "info", "Initiating M-Pesa STK Push...");
                
                // Get current user's ID token
                const currentUser = auth.currentUser;
                if (!currentUser) {
                    await signInAnonymously(auth);
                }
                
                const idToken = await auth.currentUser.getIdToken();

                // Call Firebase Function
                const response = await fetch(
                    `https://us-central1-${appId}.cloudfunctions.net/initiateMpesaPayment`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${idToken}`,
                        },
                        body: JSON.stringify({
                            phoneNumber: phoneNumber,
                            amount: selectedPackage.price,
                            packageId: selectedPackage.id,
                            appId: appId,
                            userId: ownerId,
                        })
                    }
                );

                const result = await response.json();

                if (!response.ok) {
                    setStatus(paymentStatus, "error", result.error || "Payment initiation failed.");
                    return;
                }

                setStatus(paymentStatus, "success", "STK Push sent! Check your phone for M-Pesa prompt.");
                
                // Clear form
                mpesaNumberInput.value = '';
                
                // Poll for payment completion
                pollPaymentStatus(result.checkoutRequestId, ownerId);
                
            } catch (error) {
                console.error("Payment error:", error);
                setStatus(paymentStatus, "error", error.message || "Failed to initiate payment. Check console.");
            }
        };

        window.pollPaymentStatus = async (checkoutRequestId, userId) => {
            let attempts = 0;
            const maxAttempts = 60; // 2 minutes
            
            const checkStatus = setInterval(async () => {
                attempts++;
                
                if (attempts > maxAttempts) {
                    clearInterval(checkStatus);
                    return;
                }
            }, 2000); // Check every 2 seconds
        };

        const shortTermTarget = document.getElementById("short-term-packages");
        const longTermTarget = document.getElementById("long-term-packages");
        const voucherForm = document.getElementById("voucher-form");
        const voucherCodeInput = document.getElementById("voucher-code");
        const hotspotUsernameInput = document.getElementById("hotspot-username");
        const hotspotPasswordInput = document.getElementById("hotspot-password");
        const authUsernameInput = document.getElementById("auth-username");
        const authPasswordInput = document.getElementById("auth-password");
        const voucherStatus = document.getElementById("voucher-status");
        const paymentStatus = document.getElementById("payment-status");
        const stkPushButton = document.getElementById("stk-push-btn");
        const mpesaNumberInput = document.getElementById("mpesa-number");
        const packagesNote = document.getElementById("packages-note");

        const escapeHtml = (value = "") => String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");

        let selectedPackage = null;
        let availablePackages = [];

        const filterLoginPackages = (items = []) => {
            return items.filter((pkg) => (pkg.type || "hotspot") === "hotspot");
        };

        const getPackageDurationHours = (pkg = {}) => {
            const explicitHours = Number(pkg.durationHours || 0);
            if (explicitHours > 0) return explicitHours;
            const minutes = Number(pkg.durationMinutes || 0);
            if (minutes > 0) return minutes / 60;
            return 0;
        };

        const getPackageDurationMinutes = (pkg = {}) => {
            const explicitMinutes = Number(pkg.durationMinutes || 0);
            if (explicitMinutes > 0) return explicitMinutes;
            const hours = Number(pkg.durationHours || 0);
            if (hours > 0) return hours * 60;
            return 0;
        };

        const formatDurationLabel = (hoursValue) => {
            const hours = Number(hoursValue || 0);
            if (hours <= 0) return "No duration";
            if (hours >= 24 && hours % 24 === 0) {
                const days = hours / 24;
                return `${days} Day${days === 1 ? "" : "s"}`;
            }
            if (hours >= 1) {
                const rounded = Number.isInteger(hours) ? hours : Number(hours.toFixed(1));
                return `${rounded} Hour${rounded === 1 ? "" : "s"}`;
            }
            const minutes = Math.max(1, Math.round(hours * 60));
            return `${minutes} Minute${minutes === 1 ? "" : "s"}`;
        };

        const readCachedPackages = () => {
            if (!ownerId) {
                return [];
            }

            try {
                const cached = localStorage.getItem(`hotspotpro_packages_${ownerId}`);
                return cached ? filterLoginPackages(JSON.parse(cached)) : [];
            } catch (error) {
                console.warn("Could not read cached packages:", error);
                return [];
            }
        };

        const setStatus = (element, kind, message) => {
            element.className = `status show ${kind}`;
            element.textContent = message;
        };

        const markVoucherAsUsed = async (voucher) => {
            if (!ownerId || !voucher?.id) return;

            const packageItem = availablePackages.find((p) => p.id === voucher.packageId);
            const durationHours = getPackageDurationHours(packageItem);
            const now = Date.now();
            const updatePayload = {
                used: true,
                activatedAt: new Date(now).toISOString(),
                updatedAt: Date.now(),
            };

            if (durationHours > 0) {
                updatePayload.expiresAt = new Date(now + durationHours * 60 * 60 * 1000).toISOString();
            }

            try {
                await updateDoc(doc(db, "artifacts", appId, "users", ownerId, "vouchers", voucher.id), updatePayload);
            } catch (error) {
                console.warn("Could not flag voucher as used:", error);
            }
        };

        const markHotspotUserSession = async (hotspotUser) => {
            if (!ownerId || !hotspotUser?.id) return 0;

            const packageItem = availablePackages.find((p) => p.id === hotspotUser.packageId);
            const durationMinutes = getPackageDurationMinutes(packageItem);
            const now = Date.now();
            const updatePayload = {
                lastLoginAt: new Date(now).toISOString(),
                lastLoginSource: "login.html",
                updatedAt: Date.now()
            };

            if (durationMinutes > 0) {
                updatePayload.sessionAllocatedMinutes = durationMinutes;
                updatePayload.sessionExpiresAt = new Date(now + durationMinutes * 60 * 1000).toISOString();
            }

            try {
                await updateDoc(doc(db, "artifacts", appId, "users", ownerId, "hotspot-users", hotspotUser.id), updatePayload);
            } catch (error) {
                console.warn("Could not update hotspot user session allocation:", error);
            }

            return durationMinutes;
        };

        const renderPackages = (target, items) => {
            if (!items.length) {
                target.innerHTML = '<div class="empty-state">No packages available yet.</div>';
                return;
            }

            target.innerHTML = items.map((pkg) => {
                const price = Number(pkg.price || 0).toFixed(0);
                const hours = getPackageDurationHours(pkg);
                const durationLabel = formatDurationLabel(hours);

                return [
                    '<div class="plan-card" style="cursor: pointer; border: 2px solid rgba(37, 99, 235, 0.2);" onclick="selectPackage(this, \'' + 
                    pkg.id.replace(/'/g, "\\'") + '\', \'' + 
                    escapeHtml(pkg.name).replace(/'/g, "\\'") + '\', ' + 
                    price + ', ' + 
                    hours + ')">',
                    `<div class="plan-title">${durationLabel}</div>`,
                    `<div class="plan-price">${price}<span>KSH</span></div>`,
                    `<div class="plan-name">${escapeHtml(pkg.name || "Package")}</div>`,
                    '</div>'
                ].join("");
            }).join("");
        };

        const splitPackagesByDuration = (items) => {
            const shortTerm = [];
            const longTerm = [];
            items.forEach((pkg) => {
                const hours = getPackageDurationHours(pkg);
                if (hours <= 24) {
                    shortTerm.push(pkg);
                } else {
                    longTerm.push(pkg);
                }
            });
            return { shortTerm, longTerm };
        };

        const syncPackages = async () => {
            if (!ownerId) {
                renderPackages(shortTermTarget, []);
                renderPackages(longTermTarget, []);
                packagesNote.textContent = "No dashboard owner found yet. Open the dashboard first, or load this page with ?owner=YOUR_USER_UID.";
                return;
            }

            try {
                const snapshot = await getDocs(collection(db, "artifacts", appId, "users", ownerId, "packages"));
                availablePackages = filterLoginPackages(snapshot.docs.map((docItem) => ({ id: docItem.id, ...docItem.data() })))
                    .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
                const grouped = splitPackagesByDuration(availablePackages);
                renderPackages(shortTermTarget, grouped.shortTerm);
                renderPackages(longTermTarget, grouped.longTerm);
                packagesNote.textContent = availablePackages.length
                    ? `Loaded ${availablePackages.length} hotspot package${availablePackages.length === 1 ? "" : "s"} from the dashboard.`
                    : "No hotspot packages have been added in the dashboard yet.";
            } catch (error) {
                console.error("Package sync failed:", error);
                shortTermTarget.innerHTML = '<div class="empty-state">Could not load packages.</div>';
                longTermTarget.innerHTML = '<div class="empty-state">Could not load packages.</div>';
                packagesNote.textContent = "Package loading failed. Serve this page over http and make sure Firebase anonymous auth and Firestore access are enabled.";
            }
        };

        voucherForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const voucherCode = voucherCodeInput.value.trim().toUpperCase();
            const manualUser = hotspotUsernameInput.value.trim();
            const manualPass = hotspotPasswordInput.value;
            const submitterId = event.submitter && event.submitter.id ? event.submitter.id : "";
            const isVoucherSubmit = submitterId === "voucher-submit-btn";
            const isLoginSubmit = submitterId === "login-submit-btn";

            if (!ownerId) {
                setStatus(voucherStatus, "error", "This portal is not linked to a dashboard owner yet.");
                return;
            }

            try {
                setStatus(voucherStatus, "info", "Checking credentials with Firebase...");

                let matchedVoucher = null;

                if (isLoginSubmit) {
                    if (!manualUser || !manualPass) {
                        setStatus(voucherStatus, "error", "Enter hotspot username and password.");
                        return;
                    }

                    const hotspotUserQuery = query(
                        collection(db, "artifacts", appId, "users", ownerId, "hotspot-users"),
                        where("username", "==", manualUser)
                    );
                    const hotspotUserSnapshot = await getDocs(hotspotUserQuery);
                    const hotspotUser = hotspotUserSnapshot.docs
                        .map((d) => ({ id: d.id, ...d.data() }))
                        .find((u) => String(u.password || "") === String(manualPass));

                    if (hotspotUser) {
                        if ((hotspotUser.status || "active") !== "active") {
                            setStatus(voucherStatus, "error", "Hotspot user is disabled.");
                            return;
                        }

                        const allocatedMinutes = await markHotspotUserSession(hotspotUser);
                        authUsernameInput.value = hotspotUser.username || manualUser;
                        authPasswordInput.value = hotspotUser.password || manualPass;

                        const allocatedLabel = allocatedMinutes > 0
                            ? formatDurationLabel(allocatedMinutes / 60)
                            : "profile-controlled session";
                        setStatus(voucherStatus, "success", `Login successful. ${allocatedLabel} allocated. Connecting internet...`);
                        window.setTimeout(() => voucherForm.submit(), 500);
                        return;
                    }

                    const voucherUsernameQuery = query(
                        collection(db, "artifacts", appId, "users", ownerId, "vouchers"),
                        where("username", "==", manualUser)
                    );
                    const voucherUsernameSnapshot = await getDocs(voucherUsernameQuery);
                    matchedVoucher = voucherUsernameSnapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                        .find(v => v.password === manualPass);
                    if (!matchedVoucher) {
                        setStatus(voucherStatus, "error", "Invalid hotspot username/password.");
                        return;
                    }
                } else if (isVoucherSubmit || voucherCode) {
                    if (!voucherCode) {
                        setStatus(voucherStatus, "error", "Enter voucher code first.");
                        return;
                    }

                    const voucherQuery = query(
                        collection(db, "artifacts", appId, "users", ownerId, "vouchers"),
                        where("code", "==", voucherCode)
                    );
                    const voucherSnapshot = await getDocs(voucherQuery);
                    if (voucherSnapshot.empty) {
                        setStatus(voucherStatus, "error", "Voucher not found. Please check the code and try again.");
                        return;
                    }
                    matchedVoucher = { id: voucherSnapshot.docs[0].id, ...voucherSnapshot.docs[0].data() };
                } else {
                    setStatus(voucherStatus, "error", "Choose Log In or Activate Voucher and fill the required fields.");
                    return;
                }

                if ((matchedVoucher.status || "active") !== "active") {
                    setStatus(voucherStatus, "error", `This voucher is ${matchedVoucher.status || "not active"}.`);
                    return;
                }

                // mark voucher as active session (billing record)
                await markVoucherAsUsed(matchedVoucher);

                authUsernameInput.value = matchedVoucher.username || matchedVoucher.code || "";
                authPasswordInput.value = matchedVoucher.password || matchedVoucher.code || "";

                setStatus(voucherStatus, "success", "Voucher successful. Connecting internet now...");
                window.setTimeout(() => voucherForm.submit(), 500);
            } catch (error) {
                console.error("Credential check failed:", error);
                setStatus(voucherStatus, "error", "Could not verify credentials right now. Please try again.");
            }
        });

        stkPushButton.addEventListener("click", () => {
            const phone = mpesaNumberInput.value.trim();
            if (!phone) {
                setStatus(paymentStatus, "error", "Enter your M-Pesa number first.");
                return;
            }
            
            if (!selectedPackage) {
                setStatus(paymentStatus, "error", "Please select a package first.");
                return;
            }

            initiateMpesaPayment(phone);
        });

        // Keyboard support for modal
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('mpesa-modal');
            if (!modal.classList.contains('hidden')) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitMpesaModal();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeMpesaModal();
                }
            }
        });

        // Close modal when clicking outside
        document.getElementById('mpesa-modal').addEventListener('click', (e) => {
            if (e.target.id === 'mpesa-modal') {
                closeMpesaModal();
            }
        });

        try {
            await signInAnonymously(auth);
            await syncPackages();
            window.setInterval(syncPackages, 7000);
        } catch (error) {
            console.error("Firebase auth failed:", error);
            const code = error && error.code ? ` (${error.code})` : "";
            const cachedPackages = readCachedPackages();
            if (cachedPackages.length) {
                const grouped = splitPackagesByDuration(cachedPackages);
                renderPackages(shortTermTarget, grouped.shortTerm);
                renderPackages(longTermTarget, grouped.longTerm);
                packagesNote.textContent = `Firebase authentication failed${code}, so cached hotspot packages are being shown instead.`;
                setStatus(voucherStatus, "info", `Firebase authentication failed${code}. Cached packages loaded; voucher verification still needs Firebase access.`);
            } else {
                setStatus(voucherStatus, "error", `Firebase authentication failed${code}. Enable Anonymous Auth and serve this page over http/https, not file://.`);
                renderPackages(longTermTarget, []);
                packagesNote.textContent = `Firebase authentication failed${code}. Check Anonymous Auth in Firebase Console and make sure this page is opened from a web server.`;
            }
        }
    </script>
